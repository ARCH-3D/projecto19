<!DOCTYPE html>
<html lang="pt-PT">
<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Projecto 19</title>

<link rel="preload"
      as="image"
      href="img/hero/hero1.webp">

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@200&display=swap"
      rel="stylesheet">

<link rel="stylesheet"
      href="css/style.css">

</head>

<body>

<header>

    <div class="header-left">
        <a href="index.html" class="logo-link">
            <img src="img/Logo.webp" alt="Logo Projecto 19" class="logo" decoding="async">
            <h1>Projecto 19</h1>
        </a>
    </div>

    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu">
        ☰
    </button>

    <nav id="menu">
        <a href="index.html">Home</a>
        <a href="projetos.html">Projetos</a>
        <a href="sobre.html">Sobre</a>
        <a href="servicos.html">Serviços</a>
        <a href="contato.html">Contacto</a>
    </nav>

</header>

<!-- HERO -->
<div class="hero">

    <img id="hero-image"
         class="hero-image"
         src="img/hero/hero1.webp"
         alt="Projeto 19"
         fetchpriority="high"
         decoding="async">

    <div class="hero-text">
        <h2>Projecto 19</h2>
        <p>Arquitetura e Design</p>
    </div>

</div>

<footer>

    <div class="social-links">

        <a href="https://www.instagram.com/projecto_19/"
           target="_blank"
           rel="noopener noreferrer">

            <img
                src="img/icons/instagram.svg"
                alt=""
                class="social-icon">

            <span>Instagram</span>

        </a>

        <a href="https://www.facebook.com/projecto19"
           target="_blank"
           rel="noopener noreferrer">

            <img
                src="img/icons/facebook.svg"
                alt=""
                class="social-icon">

            <span>Facebook</span>

        </a>

    </div>

    <p>© PROJETO 19</p>

</footer>

<script>

const hero = document.getElementById("hero-image");

const imagens = [
    "img/hero/hero1.webp",
    "img/hero/hero2.webp",
    "img/hero/hero3.webp",
    "img/hero/hero4.webp",
    "img/hero/hero5.webp",
    "img/hero/hero6.webp",
    "img/hero/hero7.webp",
    "img/hero/hero8.webp",
    "img/hero/hero9.webp",
    "img/hero/hero10.webp",
    "img/hero/hero11.webp",
    "img/hero/hero12.webp",
    "img/hero/hero13.webp",
    "img/hero/hero14.webp",
    "img/hero/hero15.webp",
    "img/hero/hero16.webp",
    "img/hero/hero17.webp",
    "img/hero/hero18.webp",
    "img/hero/hero19.webp",
    "img/hero/hero20.webp",
    "img/hero/hero21.webp",
    "img/hero/hero22.webp",
    "img/hero/hero23.webp",
    "img/hero/hero24.webp",
    "img/hero/hero25.webp",
    "img/hero/hero26.webp"
];

let indice = 0;

let preload = new Image();
preload.src = imagens[1];

setInterval(() => {

    indice = (indice + 1) % imagens.length;

    hero.style.opacity = 0;

    setTimeout(() => {

        hero.src = imagens[indice];

        hero.onload = () => {

            hero.style.opacity = 1;

            preload = new Image();
            preload.src = imagens[(indice + 1) % imagens.length];

        };

    }, 400);

}, 5000);

</script>

<div class="contact-widget">

    <div class="contact-links">

        <a href="mailto:info.projecto19@gmail.com">

            <img
                src="img/icons/e-mail.svg"
                alt=""
                class="contact-link-icon">

            <span>Email</span>

        </a>

        <a href="https://wa.me/351934185719"
           target="_blank"
           rel="noopener noreferrer">

            <img
                src="img/icons/whatsapp.svg"
                alt=""
                class="contact-link-icon">

            <span>WhatsApp</span>

        </a>

    </div>

    <button class="contact-trigger" aria-label="Abrir contactos">

        <img
            src="img/icons/faleconnosco.svg"
            alt=""
            class="contact-icon">

        <span>Fale Connosco</span>

    </button>

</div>

<script>

const contactWidget = document.querySelector(".contact-widget");
const contactButton = document.querySelector(".contact-trigger");

contactButton.addEventListener("click", function(e){

    e.stopPropagation();

    contactWidget.classList.toggle("active");

});

document.addEventListener("click", function(){

    contactWidget.classList.remove("active");

});

contactWidget.addEventListener("click", function(e){

    e.stopPropagation();

});

function toggleMenu() {

    document.getElementById("menu").classList.toggle("active");

}

document.querySelectorAll("#menu a").forEach(link => {

    link.addEventListener("click", () => {

        document.getElementById("menu").classList.remove("active");

    });

});

</script>

</body>
</html>
