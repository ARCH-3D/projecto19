<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <title>Projetos</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ================== ESTILOS PARA PROJETOS E MODAL ================== */

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
    }

    .project {
      position: relative;
      width: 100%;
      max-width: 500px;
      height: 500px;
      border-radius: 10px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .project:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .project img, .project video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .project-title {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      color: #fff;
      text-align: center;
      padding: 15px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.2em;
      font-weight: 500;
      letter-spacing: 0.5px;
      border-radius: 0 0 10px 10px;
    }

    /* ================== MODAL ================== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 40px 20px;
    }

    .modal-gallery {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      max-width: 90%;
      max-height: 90%;
    }

    #modal-content img,
    #modal-content video {
      width: 80vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 10px;
    }

    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 40px;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 5px;
      transition: background 0.3s;
    }

    .prev:hover, .next:hover {
      background: rgba(0,0,0,0.8);
    }

    .prev { left: -60px; }
    .next { right: -60px; }

    .close {
      position: absolute;
      top: 20px;
      right: 40px;
      color: white;
      font-size: 50px;
      cursor: pointer;
      font-weight: bold;
      transition: color 0.3s;
    }

    .close:hover {
      color: #aaa;
    }

    @media (max-width: 768px) {
      .project {
        width: 90%;
        height: 350px;
      }
      .prev { left: -40px; }
      .next { right: -40px; }
      #modal-content img,
      #modal-content video {
        width: 95vw;
      }
    }

    @media (max-width: 480px) {
      .project {
        height: 300px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="index.html" class="logo-link">
      <img src="img/logo.png" alt="Logo Projecto 19" class="logo">
      <h1>Projecto 19</h1>
    </a>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="projetos.html">Projetos</a>
    <a href="sobre.html">Sobre</a>
    <a href="servicos.html">Serviços</a>
    <a href="contato.html">Contacto</a>
  </nav>
</header>

<section>
  <div class="grid">
    <!-- Projeto 1 -->
    <div class="project" onclick="abrirProjeto('projeto1')">
      <div class="project-title">Moradia em Campo - Barcelos</div>
      <img src="img/projetos/181_Moradia_Campo_Barcelos/181_1.png" alt="Projeto 1">
    </div>

    <!-- Projeto 2 -->
    <div class="project" onclick="abrirProjeto('projeto2')">
      <div class="project-title">Renovação em Real - Braga</div>
      <img src="img/projetos/176_6.png" alt="Projeto 2">
    </div>

    <!-- Projeto 3 -->
    <div class="project" onclick="abrirProjeto('projeto3')">
      <div class="project-title">Moradia em Mogege - Famalicão</div>
      <img src="img/projetos/168_Moradia_Mogege_Famalicao/Ext_5.png" alt="Projeto 3">
    </div>
  </div>
</section>

<!-- Modal -->
<div id="modal-projeto" class="modal">
  <span class="close" onclick="fecharModal()">&times;</span>
  <div class="modal-gallery">
    <button class="prev" onclick="mudarMidia(-1)">&#10094;</button>
    <div id="modal-content"></div>
    <button class="next" onclick="mudarMidia(1)">&#10095;</button>
  </div>
</div>

<script>
const projetos = {
  projeto1: [
    { type: 'image', src: "img/projetos/181_Moradia_Campo_Barcelos/181_1.png" },
    { type: 'video', src: "img/projetos/181_Moradia_Campo_Barcelos/Video3D_MoradiaCampo.mp4" },
    { type: 'image', src: "img/projetos/181_Moradia_Campo_Barcelos/181_3.png" }
  ],
  projeto2: [
    { type: 'image', src: "img/projetos/176_6.png" },
    { type: 'image', src: "img/projetos/176_7.png" },
    { type: 'image', src: "img/projetos/176_8.png" }
  ],
  projeto3: [
    { type: 'image', src: "img/projetos/168_Moradia_Mogege_Famalicao/Ext_3.png" },
    { type: 'image', src: "img/projetos/168_Moradia_Mogege_Famalicao/Ext_4.png" },
    { type: 'image', src: "img/projetos/168_Moradia_Mogege_Famalicao/Ext_5.png" },
    { type: 'image', src: "img/projetos/168_Moradia_Mogege_Famalicao/Ext_7.png" },
    { type: 'image', src: "img/projetos/168_Moradia_Mogege_Famalicao/Ext_8.png" }
  ]
};

let midiasAtuais = [];
let indiceAtual = 0;

/* Abrir modal */
function abrirProjeto(nomeProjeto) {
  midiasAtuais = projetos[nomeProjeto];
  indiceAtual = 0;
  mostrarMidia();
  document.getElementById('modal-projeto').style.display = 'flex';
}

/* Fechar modal */
function fecharModal() {
  document.getElementById('modal-projeto').style.display = 'none';
  document.getElementById('modal-content').innerHTML = '';
}

/* Navegar entre mídias */
function mudarMidia(direcao) {
  indiceAtual += direcao;
  if (indiceAtual < 0) indiceAtual = midiasAtuais.length - 1;
  if (indiceAtual >= midiasAtuais.length) indiceAtual = 0;
  mostrarMidia();
}

/* Mostrar mídia (imagem ou vídeo) */
function mostrarMidia() {
  const conteudo = document.getElementById('modal-content');
  conteudo.innerHTML = '';
  const midia = midiasAtuais[indiceAtual];

  if (midia.type === 'image') {
    const img = document.createElement('img');
    img.src = midia.src;
    conteudo.appendChild(img);
  } else if (midia.type === 'video') {
    const video = document.createElement('video');
    video.src = midia.src;
    video.controls = true;
    video.autoplay = true;
    video.muted = true;
    video.loop = true;
    conteudo.appendChild(video);
  }
}

/* Navegação com teclado */
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('modal-projeto');
  if (modal.style.display === 'flex') {
    if (e.key === "ArrowLeft") {
      mudarMidia(-1);
    } else if (e.key === "ArrowRight") {
      mudarMidia(1);
    } else if (e.key === "Escape") {
      fecharModal();
    }
  }
});
</script>

</body>
</html>
